adding-left: var(--pad); padding-right: var(--pad); }\n\n  /* ============================================================\n     Nav\n  ============================================================ */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(32,28,43,0.75);\n    backdrop-filter: saturate(140%) blur(14px);\n    -webkit-backdrop-filter: saturate(140%) blur(14px);\n    border-bottom: 1px solid var(--rule-2);\n  }\n  .nav-inner {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 14px 0;\n    gap: 12px;\n  }\n  @media (max-width: 879px) {\n    .nav .wrap.nav-inner {\n      padding-left: max(20px, env(safe-area-inset-left, 0px));\n      padding-right: max(20px, env(safe-area-inset-right, 0px));\n    }\n  }\n  .wm {\n    display: inline-flex; align-items: center; gap: 9px;\n    font-family: \"Outfit\", sans-serif;\n    font-weight: 700; font-size: 20px; letter-spacing: -0.035em;\n    color: var(--ink);\n  }\n  .wm .dot {\n    width: 9px; height: 9px; border-radius: 50%;\n    background: #22c55e;\n    box-shadow: 0 0 14px rgba(34,197,94,.6);\n  }\n  .nav-links { display: none; }\n  .nav-cta {\n    background: linear-gradient(135deg, #8b5cf6 10%, #22c55e 100%); color: #ffffff;\n    box-shadow: 0 4px 14px rgba(139,92,246,.25);\n    padding: 10px 16px; border-radius: 999px;\n    border: 0;\n    background-clip: padding-box;\n    font-size: 14px; font-weight: 500;\n    transition: transform .15s ease;\n  }\n  .nav-cta:hover { transform: translateY(-1px); }\n\n  /* Hamburger — mobile only */\n  .nav-burger {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: transparent;\n    border: 1px solid var(--rule);\n    color: var(--ink);\n    padding: 9px 14px 9px 12px;\n    border-radius: 999px;\n    cursor: pointer;\n    transition: border-color .15s ease, background .15s ease;\n  }\n  .nav-burger:hover { border-color: var(--ink-soft); background: rgba(246,239,227,.04); }\n  .nav-burger .bars {\n    display: inline-flex; flex-direction: column; gap: 4px;\n    width: 16px;\n  }\n  .nav-burger .bars span {\n    display: block; height: 1.5px; background: var(--ink); border-radius: 2px;\n    transition: transform .25s ease, opacity .2s ease;\n  }\n  .nav-burger .bars span:nth-child(2) { width: 70%; margin-left: auto; }\n  .nav-burger .label {\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;\n    color: var(--ink-soft);\n  }\n\n  /* Mobile drawer */\n  .nav-drawer {\n    position: fixed; inset: 0;\n    background: rgba(20,17,28,0.72);\n    backdrop-filter: blur(18px) saturate(140%);\n    -webkit-backdrop-filter: blur(18px) saturate(140%);\n    z-index: 100;\n    opacity: 0; pointer-events: none;\n    transition: opacity .25s ease;\n    display: flex; flex-direction: column;\n  }\n  .nav-drawer[data-open=\"true\"] {\n    opacity: 1; pointer-events: auto;\n  }\n  .nav-drawer-top {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 14px var(--pad);\n    border-bottom: 1px solid var(--rule-2);\n  }\n  .nav-drawer-close {\n    background: transparent; border: 1px solid var(--rule);\n    color: var(--ink);\n    width: 40px; height: 40px; border-radius: 50%;\n    display: grid; place-items: center;\n    cursor: pointer;\n    font-size: 18px;\n    transition: border-color .15s ease;\n  }\n  .nav-drawer-close:hover { border-color: var(--ink-soft); }\n  .nav-drawer-list {\n    list-style: none; margin: 0;\n    padding: clamp(16px, 5vw, 32px) var(--pad) 24px;\n    display: flex; flex-direction: column;\n    flex: 1;\n    overflow-y: auto;\n  }\n  .nav-drawer-list li {\n    border-bottom: 1px solid var(--rule-2);\n  }\n  .nav-drawer-list a {\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 22px 4px;\n    font-family: \"Outfit\", sans-serif;\n    font-weight: 500;\n    font-size: 26px;\n    letter-spacing: or .15s ease; }\n    .nav-links a:hover { color: var(--ink); }\n    .nav-cta { padding: 12px 18px; font-size: 14.5px; }\n  }\n\n  /* hide desktop CTA on mobile (replaced by burger which opens drawer) */\n  @media (max-width: 879px) {\n    .nav-cta { display: none; }\n  }\n\n  /* ============================================================\n     SECTION 1 — Hero\n  ============================================================ */\n  .hero {\n    position: relative;\n    padding-top: clamp(40px, 8vw, 80px);\n    padding-bottom: clamp(60px, 10vw, 120px);\n    text-align: center;\n    overflow: hidden;\n  }\n  /* ambient sunset glow */\n  .hero::before {\n    content: \"\"; position: absolute; inset: -20% -10% auto -10%; height: 80%;\n    background:\n      radial-gradient(ellipse at 30% 100%, rgba(139,92,246,.40), transparent 60%),\n      radial-gradient(ellipse at 80% 70%, rgba(34,197,94,.22), transparent 55%),\n      radial-gradient(ellipse at 60% 30%, rgba(139,92,246,.18), transparent 60%);\n    filter: blur(40px);\n    pointer-events: none;\n    z-index: 0;\n  }\n  .hero > * { position: relative; z-index: 1; }\n\n  .pill {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 7px 14px; border-radius: 999px;\n    background: rgba(34,197,94,0.10);\n    border: 1px solid rgba(34,197,94,0.30);\n    color: #22c55e;\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;\n    margin-bottom: 28px;\n  }\n  .pill .live-dot {\n    width: 6px; height: 6px; border-radius: 50%; background: #22c55e;\n    animation: pulse 1.8s infinite;\n  }\n  @keyframes pulse {\n    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }\n    70% { box-shadow: 0 0 0 9px rgba(34,197,94,0); }\n    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }\n  }\n\n  .h1 {\n    font-family: \"Outfit\", sans-serif;\n    font-weight: 900;\n    font-size: clamp(40px, 9vw, 88px);\n    line-height: 1.0;\n    letter-spacing: -0.035em;\n    margin: 0 auto;\n    max-width: 16ch;\n    color: var(--ink);\n    text-wrap: balance;\n  }\n  .h1 em {\n    font-family: \"Outfit\", sans-serif; font-style: normal; font-weight: 400;\n    color: var(--accent);\n  }\n\n  .lede {\n    font-size: clamp(16px, 2vw, 19px);\n    line-height: 1.55;\n    color: var(--ink-soft);\n    max-width: 56ch;\n    margin: 22px auto 30px;\n    text-wrap: pretty;\n  }\n\n  .ctas {\n    display: flex; flex-direction: column; gap: 12px;\n    align-items: center; justify-content: center;\n    margin-bottom: 18px;\n  }\n  @media (min-width: 560px) {\n    .ctas { flex-direction: row; gap: 14px; }\n  }\n\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n    font-family: \"Outfit\", sans-serif;\n    font-weight: 500; font-size: 15.5px;\n    padding: 16px 26px; border-radius: 12px;\n    border: 1px solid transparent;\n    cursor: pointer;\n    transition: transform .15s ease, background .15s ease, border-color .15s ease;\n    width: 100%;\n    max-width: 320px;\n  }\n  @media (min-width: 560px) { .btn { width: auto; } }\n  .btn-p {\n    background: linear-gradient(135deg, #8b5cf6 10%, #22c55e 100%);\n    color: #ffffff;\n    border: 0;\n    padding: 17px 27px;\n    background-clip: padding-box;\n    box-shadow: 0 4px 14px rgba(139,92,246,0.25), 0 10px 30px -10px rgba(139,92,246,.45);\n  }\n  .btn-p:hover { transform: translateY(-1px); }\n  .btn-s {\n    background: transparent; color: var(--ink);\n    border-color: var(--rule);\n  }\n  .btn-s:hover { border-color: var(--ink-soft); }\n\n  .scribble-row { margin-top: 6px; font-family: \"Caveat\", cursive; font-size: 22px; color: #a3a3a3; }\n  .scribble-row .arrow { color: rgba(34,197,94,.6); margin-right: 6px; }\n\n  /* hero painted frame */\n  .hero-frame-wrap {\n    position: relative;\n    margin: clamp(48px, 8vw, 80px) auto 0;\n    max-width: 980px;\n    padding: 18px;\n    border-radius: 22px;\n  }\n  .hero-frame-wrap::before {\n    content: \"\"; position: absolute; inset: -6px; border-radius: 28px;\n    background:\n      radial-gradient(circle at 20% 30%, rgba(139,92,246,.85), transparent 55%),\n      radial-gradient(circle at 80% 70%, rgba(34,197,94,.55), transparent 55%),\n      radial-gradient(circle at 60% 20%, rgba(139,92,246,.50), transparent 50%);\n    filter: blur(28px);\n    z-index: 0;\n    opacity: .85;\n  }\n  .hero-frame-wrap::after {\n    content: \"\"; position: absolute; inset: -6px; border-radius: 28px;\n    background-image: radial-gradient(rgba(0,0,0,.5) 1px, transparent 1.5px);\n    background-size: 3px 3px;\n    mix-blend-mode: multiply;\n    opacity: .35;\n    z-index: 1;\n    pointer-events: none;\n  }\n  .hero-frame {\n    position: relative; z-index: 2;\n    aspect-ratio: 16 / 9;\n    background: var(--bg-card);\n    border: 1px solid var(--rule);\n    border-radius: 14px;\n    overflow: hidden;\n    display: grid; place-items: center;\n  }\n  .hero-frame .topbar {\n    position: absolute; top: 0; left: 0; right: 0; height: 36px;\n    background: rgba(0,0,0,0.5);\n    border-bottom: 1px solid var(--rule);\n    display: flex; align-items: center; gap: 10px;\n    padding: 0 14px;\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 11px;\n    color: var(--ink-mute);\n  }\n  .hero-frame .topbar .dots { color: #737373; letter-spacing: 4px; }\n  .hero-frame .topbar .tab {\n    color: var(--ink); padding: 0 6px;\n  }\n  .hero-frame .topbar .meta { margin-left: auto; }\n  .hero-frame .topbar .meta b { color: #22c55e; font-weight: 500; }\n  .hero-frame .play {\n    width: 76px; height: 76px; border-radius: 50%;\n    background: linear-gradient(135deg, #8b5cf6 10%, #22c55e 100%); color: #fff;\n    display: grid; place-items: center;\n    font-size: 28px;\n    box-shadow: 0 12px 30px -8px rgba(139,92,246,.5);\n    cursor: pointer;\n    transition: transform .15s ease;\n  }\n  .hero-frame .play:hover { transform: scale(1.06); }\n  .hero-frame .placeholder-tag {\n    position: absolute; bottom: 16px; left: 18px;\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n\n  /* Modern annotations — mono caps + thin leader line */\n  .anno {\n    display: none;\n    position: absolute;\n    z-index: 4;\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 11px;\n    letter-spacing: .14em;\n    text-transform: uppercase;\n    color: var(--ink);\n    white-space: nowrap;\n    align-items: center;\n    gap: 10px;\n    pointer-events: none;\n  }\n  .anno .num {\n    color: #22c55e;\n    font-weight: 500;\n  }\n  .anno .lbl {\n    padding: 6px 10px;\n    border: 1px solid #262626;\n    background: rgba(15,15,15,0.85);\n    backdrop-filter: blur(8px);\n    border-radius: 4px;\n    color: var(--ink);\n  }\n  .anno .leader {\n    width: 56px;\n    height: 1px;\n    background: linear-gradient(90deg, rgba(34,197,94,.7), rgba(34,197,94,0));\n    position: relative;\n  }\n  .anno .leader::before {\n    content: \"\";\n    position: absolute; left: 0; top: 50%;\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: #22c55e;\n    transform: translate(-3px, -50%);\n    box-shadow: 0 0 12px rgba(34,197,94,.7);\n  }\n  .anno.flip { flex-direction: row-reverse; }\n  .anno.flip .leader {\n    background: linear-gradient(270deg, rgba(34,197,94,.7), rgba(34,197,94,0));\n  }\n  .anno.flip .leader::before {\n    left: auto; right: 0; transform: translate(3px, -50%);\n  }\n  .anno-1 { top: -34px; left: 24px; }\n  .anno-2 { bottom: -34px; right: 24px; }\n  @media (min-width: 880px) {\n    .anno { display: inline-flex; }\n  }\n  @media (max-width: 879px) {\n    .anno { display: none; }\n  }\n\n  /* ============================================================\n     SECTION 2 — Vidéo\n  ============================================================ */\n  .video-section {\n    padding: clamp(48px, 8vw, 96px) 0;\n    text-align: center;\n  }\n  .eyebrow { font-family: \"Geist Mono\", ui-monospace, monospace; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: #22c55e; margin: 0 0 14px; }\n  .h2 {\n    font-family: \"Outfit\", sans-serif;\n    font-weight: 800;\n    font-size: clamp(28px, 5vw, 44px);\n    line-height: 1.1; letter-spacing: -0.025em;\n    margin: 0 auto;\n    max-width: 22ch;\n    text-wrap: balance;\n  }\n  .h2 em {\n    font-family: \"Outfit\", sans-serif; font-style: normal; font-weight: 400;\n    color: var(--accent);\n  }\n  .video-frame-wrap {\n    position: relative;\n    margin: clamp(28px, 5vw, 48px) auto 0;\n    max-width: 980px;\n    padding: 18px;\n  }\n  .video-frame-wrap::before {\n    content: \"\"; position: absolute; inset: -6px; border-radius: 28px;\n    background:\n      radial-gradient(circle at 20% 30%, rgba(139,92,246,.85), transparent 55%),\n      radial-gradient(circle at 80% 70%, rgba(34,197,94,.55), transparent 55%),\n      radial-gradient(circle at 60% 20%, rgba(139,92,246,.50), transparent 50%);\n    filter: blur(28px);\n    z-index: 0;\n    opacity: .85;\n  }\n  .video-frame-wrap::after {\n    content: \"\"; position: absolute; inset: -6px; border-radius: 28px;\n    background-image: radial-gradient(rgba(0,0,0,.5) 1px, transparent 1.5px);\n    background-size: 3px 3px;\n    mix-blend-mode: multiply;\n    opacity: .35;\n    z-index: 1;\n    pointer-events: none;\n  }\n  .video-frame {\n    position: relative; z-index: 2;\n    aspect-ratio: 16/9;\n    background: var(--bg-card);\n    border: 1px solid var(--rule);\n    border-radius: 14px;\n    overflow: hidden;\n    display: grid; place-items: center;\n  }\n  .video-frame .topbar {\n    position: absolute; top: 0; left: 0; right: 0; height: 36px;\n    background: rgba(0,0,0,0.5);\n    border-bottom: 1px solid var(--rule);\n    display: flex; align-items: center; gap: 10px;\n    padding: 0 14px;\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font
